name: Multi-Platform Build
on: [push]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Define the operating systems to build on
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies (Linux Only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libpulse-dev libasound2-dev  # Required for pygame/audio

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller build.spec

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MediaToolkitPro-${{ matrix.os }}
        path: dist/
  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MediaToolkitPro-windows-latest/MediaToolkitPro.exe
            MediaToolkitPro-ubuntu-latest/MediaToolkitPro
            MediaToolkitPro-macos-latest/MediaToolkitPro
          tag_name: ${{ github.ref_name }}