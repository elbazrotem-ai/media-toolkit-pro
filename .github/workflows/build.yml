name: Multi-Platform Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        if: matrix.os == 'macos-latest'
        run: brew install qt sdl2

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller build.spec

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaToolkitPro-${{ matrix.os }}
          path: |
            dist/MediaToolkitPro.exe
            dist/MediaToolkitPro
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MediaToolkitPro-windows-latest/MediaToolkitPro.exe
            MediaToolkitPro-ubuntu-latest/MediaToolkitPro
            MediaToolkitPro-macos-latest/MediaToolkitPro
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automated multi-platform release."